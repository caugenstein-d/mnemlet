<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#22C55E" stroke-width="0.5">
    <line x1="0" y1="30" x2="1200" y2="30"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="570" x2="1200" y2="570"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="30" y1="0" x2="30" y2="630"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="90" y1="0" x2="90" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="210" y1="0" x2="210" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="270" y1="0" x2="270" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="330" y1="0" x2="330" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="390" y1="0" x2="390" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="510" y1="0" x2="510" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="570" y1="0" x2="570" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="630" y1="0" x2="630" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="690" y1="0" x2="690" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="810" y1="0" x2="810" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="870" y1="0" x2="870" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="930" y1="0" x2="930" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="990" y1="0" x2="990" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1110" y1="0" x2="1110" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1170" y1="0" x2="1170" y2="630"/>
  </g>

  <!-- ===== LEFT SIDE ===== -->

  <!-- Mnémlet title — styled é overlay -->
  <text x="80" y="195" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="96" font-weight="bold" fill="#F8FAFC" letter-spacing="-2">Mn<tspan fill="#22C55E" filter="url(#glow)">é</tspan>mlet</text>

  <!-- Tagline -->
  <text x="80" y="245" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="22" fill="#94A3B8">Brain-inspired memory for your self-hosted AI stack</text>

  <!-- Terminal code block -->
  <rect x="80" y="285" width="640" height="125" rx="8" fill="url(#codeGrad)" stroke="#22C55E" stroke-width="1" opacity="0.9"/>
  <!-- Terminal dots -->
  <circle cx="98" cy="303" r="5" fill="#EF4444"/>
  <circle cx="114" cy="303" r="5" fill="#F59E0B"/>
  <circle cx="130" cy="303" r="5" fill="#22C55E"/>
  <!-- Code lines -->
  <text x="98" y="338" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="18" fill="#22C55E" font-weight="bold">$</text>
  <text x="112" y="338" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="18" fill="#F8FAFC"> mnemlet serve</text>
  <text x="98" y="370" font-family="'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="18" fill="#94A3B8">🧠 Mnémlet v0.2.0 — Running on http://localhost:4050</text>
  <!-- Blinking cursor -->
  <rect x="580" y="358" width="10" height="18" fill="#22C55E">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Badges -->
  <g transform="translate(80, 445)">
    <rect x="0" y="0" width="140" height="36" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
    <text x="70" y="24" font-family="'JetBrains Mono', monospace" font-size="15" fill="#22C55E" text-anchor="middle" font-weight="bold">Self-Hosted</text>

    <rect x="155" y="0" width="120" height="36" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
    <text x="215" y="24" font-family="'JetBrains Mono', monospace" font-size="15" fill="#22C55E" text-anchor="middle" font-weight="bold">Pi-Ready</text>

    <rect x="290" y="0" width="180" height="36" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
    <text x="380" y="24" font-family="'JetBrains Mono', monospace" font-size="15" fill="#22C55E" text-anchor="middle" font-weight="bold">Zero API Costs</text>

    <rect x="485" y="0" width="80" height="36" rx="6" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
    <text x="525" y="24" font-family="'JetBrains Mono', monospace" font-size="15" fill="#22C55E" text-anchor="middle" font-weight="bold">MIT</text>
  </g>

  <!-- ===== RIGHT SIDE: Brain ASCII Art ===== -->

  <!-- Central brain hemisphere shapes -->
  <g fill="none" stroke="#22C55E" stroke-width="2" filter="url(#softGlow)" opacity="0.9" transform="translate(785, 160)">

    <!-- Outer brain outline - stylized hemispheres -->
    <path d="M 160,80 C 160,10 260,-30 320,20 C 370,-30 470,10 470,80 C 520,120 520,200 470,240 C 450,300 370,340 320,300 C 280,340 200,340 180,300 C 120,280 120,140 160,80 Z" fill="rgba(34,197,94,0.04)"/>

    <!-- Left hemisphere fold -->
    <path d="M 200,60 C 190,100 160,160 170,220 C 175,250 200,280 230,290" stroke-width="2.5"/>
    <path d="M 240,45 C 230,100 210,170 220,230 C 225,260 240,280 270,295" stroke-width="2"/>

    <!-- Right hemisphere fold -->
    <path d="M 440,60 C 450,100 470,160 465,220 C 460,250 440,280 410,290" stroke-width="2.5"/>
    <path d="M 400,45 C 410,100 430,170 420,230 C 415,260 400,280 370,295" stroke-width="2"/>

    <!-- Corpus callosum (center connection) -->
    <path d="M 260,250 C 280,240 360,240 380,250 C 360,260 280,260 260,250 Z" fill="#22C55E" opacity="0.3"/>

    <!-- Central sulcus -->
    <line x1="320" y1="30" x2="320" y2="300" stroke-width="1.5" opacity="0.4"/>

    <!-- Neural network nodes -->
    <circle cx="230" cy="140" r="4" fill="#22C55E" opacity="0.8"/>
    <circle cx="260" cy="180" r="3" fill="#22C55E" opacity="0.6"/>
    <circle cx="300" cy="100" r="5" fill="#22C55E" opacity="0.9"/>
    <circle cx="340" cy="130" r="3.5" fill="#22C55E" opacity="0.7"/>
    <circle cx="380" cy="160" r="4" fill="#22C55E" opacity="0.8"/>
    <circle cx="400" cy="200" r="3" fill="#22C55E" opacity="0.6"/>
    <circle cx="350" cy="210" r="4.5" fill="#22C55E" opacity="0.8"/>
    <circle cx="280" cy="230" r="3.5" fill="#22C55E" opacity="0.7"/>
    <circle cx="250" cy="200" r="3" fill="#22C55E" opacity="0.6"/>
    <circle cx="310" cy="160" r="4" fill="#22C55E" opacity="0.9"/>
    <circle cx="370" cy="120" r="3" fill="#22C55E" opacity="0.5"/>
    <circle cx="210" cy="190" r="3" fill="#22C55E" opacity="0.5"/>
    <circle cx="430" cy="190" r="3" fill="#22C55E" opacity="0.5"/>

    <!-- Synaptic connections -->
    <line x1="230" y1="140" x2="300" y2="100" stroke-width="1" opacity="0.25"/>
    <line x1="260" y1="180" x2="300" y2="100" stroke-width="1" opacity="0.25"/>
    <line x1="300" y1="100" x2="340" y2="130" stroke-width="1" opacity="0.25"/>
    <line x1="340" y1="130" x2="380" y2="160" stroke-width="1" opacity="0.25"/>
    <line x1="380" y1="160" x2="350" y2="210" stroke-width="1" opacity="0.25"/>
    <line x1="350" y1="210" x2="280" y2="230" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="230" x2="250" y2="200" stroke-width="1" opacity="0.25"/>
    <line x1="250" y1="200" x2="230" y2="140" stroke-width="1" opacity="0.25"/>
    <line x1="310" y1="160" x2="350" y2="210" stroke-width="1" opacity="0.25"/>
    <line x1="370" y1="120" x2="380" y2="160" stroke-width="1" opacity="0.25"/>
    <line x1="210" y1="190" x2="260" y2="180" stroke-width="1" opacity="0.2"/>
    <line x1="430" y1="190" x2="400" y2="200" stroke-width="1" opacity="0.2"/>
    <line x1="260" y1="180" x2="280" y2="230" stroke-width="1" opacity="0.2"/>
    <line x1="380" y1="160" x2="400" y2="200" stroke-width="1" opacity="0.2"/>

    <!-- Synaptic pulses (animated) -->
    <circle cx="230" cy="140" r="2" fill="#22C55E">
      <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="300" cy="100" r="3" fill="#22C55E">
      <animate attributeName="opacity" values="0;1;1;0" dur="2.3s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="350" cy="210" r="2.5" fill="#22C55E">
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="380" cy="160" r="2" fill="#22C55E">
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="260" cy="180" r="2" fill="#22C55E">
      <animate attributeName="opacity" values="0;1;1;0" dur="2.1s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- Data flow lines (horizontal, like signals) -->
    <line x1="190" y1="310" x2="240" y2="310" stroke="#22C55E" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4">
      <animate attributeName="x1" values="190;240" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="310" x2="450" y2="310" stroke="#22C55E" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4">
      <animate attributeName="x2" values="450;400" dur="1.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Version badge (top right) -->
  <rect x="1090" y="30" width="80" height="30" rx="6" fill="#22C55E" opacity="0.85"/>
  <text x="1130" y="50" font-family="'JetBrains Mono', monospace" font-size="14" fill="#0F172A" text-anchor="middle" font-weight="bold">v0.2.0</text>

  <!-- Top decorative line -->
  <line x1="80" y1="18" x2="1120" y2="18" stroke="#22C55E" stroke-width="1" opacity="0.15"/>

  <!-- Footer -->
  <text x="80" y="600" font-family="'JetBrains Mono', monospace" font-size="14" fill="#475569">github.com/christoph/mnemlet</text>
</svg>
